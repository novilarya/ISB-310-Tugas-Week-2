<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluasi 1 - Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card-luar">
        <div class="card-utama">
            <header class="bagian-header">
                <div class="baris-banner baris-1"></div>
                <div class="baris-banner baris-2"></div>
            </header>

            <div class="tata-letak-utama">
                <aside class="bagian-samping">
                    <nav class="bagian-navigasi">
                        <div class="item-navigasi"><a href="home.html">Home</a></div>
                        <div class="item-navigasi"><a href="#" id="linkMenu">Menu</a></div>
                        <div class="item-navigasi"><a href="calculator.html">Calculator</a></div>
                    </nav>
                </aside>

                <main class="area-konten mt-3 pe-4 mb-3">
                    <table class="tabel-menu">
                        <tbody>
                            <tr class="bg-kuning">
                                <th>No</th>
                                <th>Makanan/Minuman</th>
                                <th>Harga</th>
                                <th>Pesan</th>
                                <td rowspan="7" class="sel-reset">
                                    <button id="btnResetMenu" class="tombol-hitam-kuning">Reset</button>
                                </td>
                            </tr>
                            <tr class="bg-kuning fw-bold">
                                <td>1</td>
                                <td>Bakso Istimewa</td>
                                <td>@ Rp 12000</td>
                                <td><input type="number" id="qty1" class="input-qty" value="0" min="0"></td> 
                            </tr>
                            <tr class="bg-kuning fw-bold">
                                <td>2</td>
                                <td>Soto Spesial</td>
                                <td>@ Rp 10000</td>
                                <td><input type="number" id="qty2" class="input-qty" value="0" min="0"></td>
                            </tr>
                            <tr class="bg-kuning fw-bold">
                                <td>3</td>
                                <td>Mie Ayam Super</td>
                                <td>@ Rp 15000</td>
                                <td><input type="number" id="qty3" class="input-qty" value="0" min="0"></td>
                            </tr>
                            <tr class="bg-kuning fw-bold">
                                <td colspan="3" class="text-end">Jumlah Total</td>
                                <td><input type="text" id="totalHarga" value="0" readonly></td>
                            </tr>
                            <tr class="bg-kuning fw-bold">
                                <td colspan="3" class="text-end">Diskon</td>
                                <td><input type="text" id="diskon" value="0" readonly></td>
                            </tr>
                            <tr class="bg-kuning fw-bold">
                                <td colspan="3" class="text-end">Jumlah Bayar</td>
                                <td><input type="text" id="jumlahBayar" value="0" readonly></td>
                            </tr>
                        </tbody>
                    </table>
                </main>
            </div>
            <footer class="footer">
                <div class="isi-footer">
                    280224 <br>
                    Sistem Informasi | ITENAS 2024
                </div>
            </footer>
        </div>
    </div>
        
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
