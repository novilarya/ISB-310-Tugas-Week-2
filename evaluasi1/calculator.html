<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluasi 1 - Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card-luar">
        <div class="card-utama">
            <header class="bagian-header">
                <div class="baris-banner baris-1"></div>
                <div class="baris-banner baris-2"></div>
            </header>

            <div class="tata-letak-utama">
                <aside class="bagian-samping">
                    <nav class="bagian-navigasi">
                        <div class="item-navigasi"><a href="home.html">Home</a></div>
                        <div class="item-navigasi"><a href="#" id="linkMenu">Menu</a></div>
                        <div class="item-navigasi"><a href="calculator.html">Calculator</a></div>
                    </nav>
                </aside>

                <main class="area-konten mt-4 ps-4">
                    <div class="d-flex align-items-center flex-wrap gap-2 mb-3 baris-kalkulator">
                        
                        <input type="number" id="angka1" class="input-calc kotak-angka" value="2">
                        
                        <select id="operator" class="input-calc dropdown-op text-center">
                            <option value="*">*</option>
                            <option value="/">/</option>
                            <option value="+">+</option>
                            <option value="-">-</option>
                            <option value="%">%</option>
                            <option value="^">^</option>
                        </select>
                        
                        <input type="number" id="angka2" class="input-calc kotak-angka" value="4">
                        
                        <span class="fw-bold fs-5 text-white">=</span>
                        
                        <input type="text" id="hasilCalc" class="input-calc kotak-hasil" readonly value="8">
                    </div>
                    
                    <div class="d-flex gap-3 ms-1 mt-2">
                        <button id="btnHitung" class="tombol-hitam-kuning tombol-kalkulator">Hitung</button>
                        <button id="btnResetCalc" class="tombol-hitam-kuning tombol-kalkulator">Reset</button>
                    </div>
                </main>
            </div>
            <footer class="footer">
                <div class="isi-footer">
                    280224 <br>
                    Sistem Informasi | ITENAS 2024
                </div>
            </footer>
        </div>
    </div>
        
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
